name: 🚢 Cruise Countdown

on:
  schedule:
    - cron: '1 4 * * *'  # Runs every day at 4:01 AM UTC (00:01 NYC)
  workflow_dispatch:      # Allows manual triggering

jobs:
  countdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Calculate days and update README
        run: ./.github/workflows/scripts/generate_message.sh

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update cruise countdown"
          git push
